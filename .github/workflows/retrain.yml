name: Scheduled Retraining

on:
  schedule:
    - cron: "0 6 * * 0"   # Every Sunday at 06:00 UTC
  workflow_dispatch:       # Manual trigger

concurrency:
  group: retrain-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE_NAME: diabetes-api
  REGISTRY: ghcr.io

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: "requirements/*.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/train.txt

      - name: Retrain model
        run: python train.py --experiment diabetes-prediction-scheduled

      - name: Upload retrained model artifact
        uses: actions/upload-artifact@v4
        with:
          name: retrained-model
          path: diabetes_model.pkl
          retention-days: 7

      - name: Run tests
        run: |
          pip install -r requirements/dev.txt
          pytest -v --junitxml=retrain-report.xml --cov=. --cov-report=xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retrain-test-results
          path: retrain-report.xml
